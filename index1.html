<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Layout</title>

<style>

.img_1{
    position:absolute;
    top:50px;
    left:100px;
}

.list{
    position:absolute;
    top:50px;
    left:400px;
    gap:20px;
    display:flex;
    list-style-type:none;
}

.img_2{
    position:absolute;
    top:150px;
}

.overlap{
    position:absolute;
    top:10%;
    left:5%;
    width:450px;
    background-color:white;
    font-weight:bold;
    padding:10px;
}

</style>

</head>

<body>

<div>

<img class="img_1" src="https://uhf.microsoft.com/images/microsoft/RE1Mu3b.png">

<ul class="list">
<li>Microsoft 365</li>
<li>Teams</li>
<li>Copilot</li>
<li>Windows</li>
<li>Surface</li>
<li>Xbox</li>
<li>Support</li>
</ul>

</div>


<div class="img_2">

<img id="mainImage"
src="https://cdn-dynmedia-1.microsoft.com/is/image/microsoftcorp/Highlight-Surface-Pro-AI-11Ed-Sapphire-MC001-3000x1682:VP4-1399x600"
width="1420"
height="500">

<div class="overlap">

<h2>Meet Surface Pro</h2>

<p>
This laptop's unrivalled flexibility and AI features like Live Captions
and Cocreator enable you to do more than you ever imagined.
</p>

<button style="color:blue">Learn more</button>

</div>

</div>


<script>

setTimeout(function(){

document.getElementById("mainImage").src =
"https://cdn-dynmedia-1.microsoft.com/is/image/microsoftcorp/Hero-Desktop-M365-Icon-Bounce-Premium:VP4-1399x600";

},2000);
setTimeout(function(){

document.getElementById("mainImage").src =
"https://cdn-dynmedia-1.microsoft.com/is/image/microsoftcorp/Highlight-Surface-Pro-AI-11Ed-Sapphire-MC001-3000x1682:VP4-1399x600";

},5000);


</script>

</body>

</html>
